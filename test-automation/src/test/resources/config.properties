# ==============================================================================
#                    INSIDER TEST AUTOMATION - CONFIGURATION
#
#  All test settings are managed from this file.
#  Override from command line: mvn clean test -Dbrowser=firefox -Denv=test
# ==============================================================================

# ------------------------------------------------------------------------------
# BROWSER SETTINGS
# ------------------------------------------------------------------------------
# Browser type: chrome | firefox
browser=chrome

# Headless mode: true = no browser window (ideal for CI)
#                false = browser window visible (for development/debug)
headless=false

# ------------------------------------------------------------------------------
# ENVIRONMENT
# ------------------------------------------------------------------------------
# Active environment: test | staging | production
# URLs below are automatically used based on the selected environment.
env=production

# -- Environment-specific URLs --
# base.url        = URL used for navigation
# expected.domain = domain expected in the browser after redirect

# Production (useinsider.com redirects to insiderone.com)
env.production.base.url=https://useinsider.com
env.production.expected.domain=insiderone.com
env.production.careers.path=/careers/quality-assurance/

# Staging
env.staging.base.url=https://staging.useinsider.com
env.staging.expected.domain=staging.useinsider.com
env.staging.careers.path=/careers/quality-assurance/

# Test
env.test.base.url=https://test.useinsider.com
env.test.expected.domain=test.useinsider.com
env.test.careers.path=/careers/quality-assurance/

# ------------------------------------------------------------------------------
# TIMEOUTS (seconds)
# ------------------------------------------------------------------------------
# Default wait timeout (element visible/clickable etc.)
timeout.default=15

# Short wait (quick checks, element exists?)
timeout.short=5

# Long wait (page load, heavy pages)
timeout.long=30

# ------------------------------------------------------------------------------
# ALLURE REPORT SETTINGS (SINGLE CONTROL POINT)
# ------------------------------------------------------------------------------
# Controls whether the Allure report opens in browser after tests.
# This is the ONLY place this setting is defined.
# false = report opens automatically in browser after tests
# true  = report is generated but browser does not open (for CI)
# Override: mvn test -Dskip.open.allure=true
skip.open.allure=false

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
# Log level: TRACE | DEBUG | INFO | WARN | ERROR
log.level=INFO
