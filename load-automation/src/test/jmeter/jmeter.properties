# Load test parameters (used in JMX via ${__P(threads,3)})
# Small values for n11; override via Maven: mvn verify -Dthreads=5 -DrampUp=2
threads=3
rampUp=2

# Report generator properties (required for HTML dashboard generation)
jmeter.reportgenerator.apdex_satisfied_threshold=1500
jmeter.reportgenerator.apdex_tolerated_threshold=3000
