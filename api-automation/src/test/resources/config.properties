# ============================================================================
# INSIDER API AUTOMATION - CONFIGURATION
#
# All API test settings are managed from this file.
# Override: mvn clean verify -Dapi.base.url=https://custom.api/v2
# ============================================================================

# API BASE URL
api.base.url=https://petstore.swagger.io/v2

# ALLURE REPORT SETTINGS
# false = report opens automatically in browser after tests
# true  = report is generated but browser does not open (for CI)
skip.open.allure=false

# LOGGING
log.level=INFO
# Print every request/response body to console (true = verbose, false = Allure only)
api.log.requests=false
